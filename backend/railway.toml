[build]
builder = "NIXPACKS"

[deploy]
startCommand = "uvicorn app:app --host 0.0.0.0 --port $PORT --workers 1"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"

[env]
PORT = "8000"
PYTHON_VERSION = "3.11"
TRANSFORMERS_CACHE = "/tmp/cache"
HF_HOME = "/tmp/cache"

[[build.env]]
name = "PYTHONUNBUFFERED"
value = "1"
